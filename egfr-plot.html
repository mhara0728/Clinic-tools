<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eGFR経過プロット｜はら内科医院</title>
<style>
  :root{
    --ink:#3a3128; --paper:#fdf6ec; --panel:#ffffff; --line:#ecd9bd;
    --accent:#ef9229; --accent-g:#6aab2d; --accent2:#c0202a;
    --g1:#bfe3bf; --g2:#d9eebf; --g3a:#fdf3b0; --g3b:#fbdc8e; --g4:#f5b97f; --g5:#ef9d9d;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;background:var(--paper);color:var(--ink);font-size:14px}
  header{background:linear-gradient(90deg,#f9a94f,#f7c66f);color:#fff;padding:10px 18px;display:flex;align-items:baseline;gap:14px}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.05em}
  header span{font-size:12px;opacity:.85}
  .wrap{display:grid;grid-template-columns:330px 1fr;gap:12px;padding:12px;max-width:1500px;margin:0 auto}
  @media(max-width:980px){.wrap{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}
  .panel h2{font-size:13px;margin:0 0 8px;color:#d97f14;border-bottom:2px solid var(--accent);padding-bottom:4px}
  textarea{width:100%;height:120px;font-family:Menlo,Consolas,monospace;font-size:12px;border:1px solid var(--line);border-radius:5px;padding:6px;resize:vertical}
  label{display:block;font-size:12px;margin:8px 0 3px;color:#445}
  input[type=date],input[type=number]{border:1px solid var(--line);border-radius:5px;padding:5px;font-size:13px;width:100%}
  button{background:var(--accent-g);color:#fff;border:none;border-radius:5px;padding:7px 12px;font-size:13px;cursor:pointer;margin-top:8px}
  button.sub{background:#f0a544}
  button.del{background:var(--accent2);padding:3px 8px;font-size:11px;margin:0}
  button:hover{filter:brightness(1.1)}
  .row{display:flex;gap:6px}
  .row>*{flex:1}
  .hint{font-size:11px;color:#67808d;margin-top:4px;line-height:1.5}
  .regline{border:1px solid var(--line);border-radius:6px;padding:8px;margin-top:8px;background:#fffaf2}
  .regline .meta{font-size:12px;margin-top:5px;line-height:1.6}
  .regline .slope{font-weight:700;color:var(--accent2)}
  svg{width:100%;height:auto;display:block;user-select:none}
  #chart svg{cursor:crosshair}
  .stat{font-size:12px;color:#445;margin-top:6px}
  .legend{display:flex;gap:14px;font-size:12px;margin-top:6px;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:4px}
  .dot{width:10px;height:10px;border-radius:50%;background:#8fb3e0;display:inline-block}
  .bar{width:10px;height:10px;background:#b3b378;display:inline-block}
  .rl{width:16px;height:0;border-top:2px solid #c0202a;display:inline-block}
  .clinic{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .clinicR{display:flex;align-items:center;gap:8px;text-align:right}
  .today{font-size:11px;color:#67808d}
  .clinic .name{font-size:13px;font-weight:700;color:#ef9229;letter-spacing:.06em}
  .clinic h2{margin:0;border:none;padding:0;font-size:14px;color:var(--ink)}
  .dragnote{font-size:12px;color:#d97f14;font-weight:600;margin-top:2px}
  .parsed{font-size:12px;color:#2c6e3c;margin-top:4px}

  #printSummary{display:none}
  @media print{
    @page{size:A4 landscape;margin:8mm}
    body{background:#fff;font-size:11px}
    header,.wrap>div:first-child,#printBtn,.legend,.stat{display:none!important}
    .wrap{display:block;padding:0;max-width:none}
    .panel{border:none;padding:0;page-break-inside:avoid}
    #chart svg{max-height:118mm;width:auto;max-width:100%;margin:0 auto}
    .clinic{margin-bottom:2px}
    #printSummary{display:block;margin-top:4px;font-size:10.5px;line-height:1.6}
    #printSummary h3{font-size:11.5px;color:#3a7d22;margin:3px 0 1px;border-bottom:1px solid #ccc;break-after:avoid}
    #printSummary p{margin:2px 0}
  }
</style>
</head>
<body>
<header><h1>eGFR 経過プロット</h1><span>LTEP風 ｜ カルテからコピペ → プロット・回帰・将来予測</span></header>
<div class="wrap">
  <div>
    <div class="panel">
      <h2>1. eGFRデータ貼り付け</h2>
      <textarea id="egfrInput" placeholder="デジカルの検査結果表をそのまま範囲選択してコピペでOK。
日付と数値のペアを自動で拾います。
（縦並び・横並び・表形式いずれも可）"></textarea>
      <div class="parsed" id="egfrParsed"></div>
      <div class="hint">日付（2024/1/5、2024-01-05、2024年1月5日、R6.1.5）の直後に出てくる数値をeGFRとして自動ペアリング。日付だけの行が並び、その後に数値だけの行が並ぶ形式（表の列コピー）も自動で対応します。</div>
      <label>尿蛋白データ（任意・棒グラフ表示）</label>
      <textarea id="upInput" style="height:70px" placeholder="同様に日付と数値（g/gCr または g/日）のペアを貼り付け"></textarea>
      <label>生年月日（年齢軸・年齢指定に使用）</label>
      <input type="date" id="dob">
      <label>X軸範囲（日付または年齢のどちらでも。年齢入力で日付が自動セット）</label>
      <div class="row">
        <div><input type="date" id="xStart"></div>
        <div><input type="number" id="xStartAge" placeholder="開始年齢(既定40)" min="0" max="120" step="1"></div>
      </div>
      <div class="row">
        <div><input type="date" id="xEnd"></div>
        <div><input type="number" id="xEndAge" placeholder="終了年齢(既定100)" min="0" max="120" step="1"></div>
      </div>
      <button id="plotBtn">プロット</button>
      <button id="demoBtn" class="sub">デモデータ</button>
    </div>
    <div class="panel" style="margin-top:12px">
      <h2>2. 腎機能の傾き</h2>
      <div class="dragnote">★ グラフ上をマウスで横にドラッグするだけで傾きの線を追加できます</div>
      <div class="hint">手入力する場合は下に日付または年齢を入れて「追加」。</div>
      <div class="row">
        <div><label>開始日</label><input type="date" id="regStart"></div>
        <div><label>開始年齢</label><input type="number" id="regStartAge" min="0" max="120" step="0.5" placeholder="歳"></div>
      </div>
      <div class="row">
        <div><label>終了日</label><input type="date" id="regEnd"></div>
        <div><label>終了年齢</label><input type="number" id="regEndAge" min="0" max="120" step="0.5" placeholder="歳"></div>
      </div>
      <button id="addRegBtn">この範囲で傾きを計算</button>
      <div id="regList"></div>
    </div>
  </div>
  <div class="panel">
    <div class="clinic">
      <h2 style="font-size:16px;color:#6aab2d">経過グラフ <button id="printBtn" class="sub" style="margin:0 0 0 8px;padding:4px 10px;font-size:12px;background:#6aab2d">印刷</button></h2>
      <div class="clinicR">

<script>
const DAY=86400000, YEAR=365.25*DAY;
let egfr=[], uprot=[], regs=[];
let view={t0:null,t1:null,mL:55,mR:55,mT:15,mB:95,W:1000,H:585};

/* ---------- 日付・年齢ユーティリティ ---------- */
function dobDate(){return document.getElementById('dob').valueAsDate;}
function ageAt(date){const d=dobDate(); return d?(date-d)/YEAR:null;}
function dateAtAge(a){const d=dobDate(); return d?new Date(d.getTime()+a*YEAR):null;}
function fmtAge(a){const y=Math.floor(a),m=Math.floor((a-y)*12);return y+'歳'+m+'カ月';}
function fmtD(d){return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();}

/* ---------- スマート貼り付けパーサ ----------
   テキスト全体から「日付」と「数値」をトークンとして抽出し、
   ① 日付の直後の数値をペアにする（縦並び・横並び・表コピー対応）
   ② ①で組めない場合、日付列→数値列が分かれて並ぶ形式（列単位コピー）をzipで対応 */
function smartParse(text){
  if(!text.trim()) return {data:[],note:''};
  const wareki={R:2018,H:1988,S:1925}; // 令和/平成/昭和 + 年
  // 和暦を西暦に前処理
  text=text.replace(/([RHS令平昭])[\.年]?(\d{1,2})[\.\/年](\d{1,2})[\.\/月](\d{1,2})日?/g,(m,e,y,mo,d)=>{
    const k=e==='令'?'R':e==='平'?'H':e==='昭'?'S':e;
    return (wareki[k]+ +y)+'/'+mo+'/'+d;
  });
  const re=/(\d{4})[\/\-\.年]\s?(\d{1,2})[\/\-\.月]\s?(\d{1,2})日?|(-?\d+(?:\.\d+)?)/g;
  const toks=[]; let m;
  while((m=re.exec(text))!==null){
    if(m[1]) toks.push({t:'d',v:new Date(+m[1],+m[2]-1,+m[3])});
    else toks.push({t:'n',v:parseFloat(m[4])});
  }
  // ① 直後ペアリング
  const pairs=[]; const dates=[]; const nums=[];
  for(let i=0;i<toks.length;i++){
    if(toks[i].t==='d'){
      dates.push(toks[i].v);
      if(toks[i+1] && toks[i+1].t==='n'){ pairs.push({d:toks[i].v,v:toks[i+1].v}); i++; }
    } else nums.push(toks[i].v);
  }
  let data=pairs, note='隣接ペアとして認識';
  // ② 列コピー形式（日付がまとまって並び、その後に数値がまとまる）
  if(pairs.length < dates.length && dates.length===nums.length && dates.length>1){
    data=dates.map((d,i)=>({d,v:nums[i]}));
    note='日付列＋数値列としてzip認識';
  }
  data=data.filter(p=>isFinite(p.v)&&p.v>0&&p.v<200).sort((a,b)=>a.d-b.d);
  return {data,note};
}

function linReg(pts){
  const n=pts.length; if(n<2) return null;
  const x0=pts[0].d.getTime();
  let sx=0,sy=0,sxx=0,sxy=0;
  for(const p of pts){const x=(p.d.getTime()-x0)/YEAR; sx+=x; sy+=p.v; sxx+=x*x; sxy+=x*p.v;}
  const den=n*sxx-sx*sx; if(den===0) return null;
  const slope=(n*sxy-sx*sy)/den, ic=(sy-slope*sx)/n;
  return {x0,slope,ic,n,
    at:t=>ic+slope*((t-x0)/YEAR),
    when:v=>slope>=0?null:new Date(x0+(v-ic)/slope*YEAR)};
}

const stages=[[90,130,'var(--g1)','G1'],[60,90,'var(--g2)','G2'],[45,60,'var(--g3a)','G3a'],
  [30,45,'var(--g3b)','G3b'],[15,30,'var(--g4)','G4'],[0,15,'var(--g5)','G5']];

/* ---------- 描画 ---------- */
function draw(){
  const el=document.getElementById('chart');
  if(!egfr.length){el.innerHTML='<div class="hint">データを貼り付けて「プロット」を押してください。</div>';return;}
  const {W,H,mL,mR,mT,mB}=view;
  const pw=W-mL-mR, ph=H-mT-mB;
  let t0=document.getElementById('xStart').valueAsDate?.getTime() ?? (dobDate()?dateAtAge(40).getTime():egfr[0].d.getTime()-180*DAY);
  let t1=document.getElementById('xEnd').valueAsDate?.getTime() ?? (dobDate()?dateAtAge(100).getTime():egfr[egfr.length-1].d.getTime()+5*YEAR);
  if(t1<=t0) t1=t0+YEAR;
  view.t0=t0; view.t1=t1;
  const yMax=130;
  const X=t=>mL+(t-t0)/(t1-t0)*pw;
  const Y=v=>mT+(1-v/yMax)*ph;
  const upMax=Math.max(4,...uprot.map(p=>p.v))*1.15;
  const Yu=v=>mT+ph-(v/upMax)*ph;

  let s=`<svg id="plotSvg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-size="12">`;
  for(const [lo,hi,c,lab] of stages){
    s+=`<rect x="${mL}" y="${Y(hi)}" width="${pw}" height="${Y(lo)-Y(hi)}" fill="${c}"/>`;
    s+=`<text x="${mL+5}" y="${Y(hi)+18}" fill="#33503a" font-size="16" font-weight="600" opacity=".75">${lab}</text>`;
  }
  for(let v=0;v<=yMax;v+=10){
    s+=`<line x1="${mL}" y1="${Y(v)}" x2="${mL+pw}" y2="${Y(v)}" stroke="#00000018"/>`;
    if(v%20===0) s+=`<text x="${mL-6}" y="${Y(v)+5}" text-anchor="end" font-size="15">${v}</text>`;
  }
  s+=`<text transform="rotate(-90 14 ${mT+ph/2})" x="14" y="${mT+ph/2}" text-anchor="middle" fill="#5b87b8" font-size="14">eGFR (mL/min/1.73m²)</text>`;
  for(let v=0;v<=upMax;v+=upMax>8?2:1) s+=`<text x="${mL+pw+6}" y="${Yu(v)+5}" font-size="14">${v}</text>`;
  s+=`<text transform="rotate(90 ${W-12} ${mT+ph/2})" x="${W-12}" y="${mT+ph/2}" text-anchor="middle" fill="#9a9a60" font-size="14">尿蛋白 (g)</text>`;
  const spanY=(t1-t0)/YEAR;
  const step= spanY>45?10 : spanY>22?5 : spanY>12?2 : 1; // 期間に応じた刻み
  const d0=new Date(t0);
  for(let y=d0.getFullYear();;y++){
    const t=new Date(y,0,1).getTime(); if(t>t1)break; if(t<t0)continue;
    const major=(y%step===0);
    s+=`<line x1="${X(t)}" y1="${mT}" x2="${X(t)}" y2="${mT+ph}" stroke="${major?'#00000030':'#00000012'}"/>`;
    if(!major) continue;
    s+=`<text x="${X(t)}" y="${mT+ph+18}" text-anchor="middle" font-size="13">${y}年</text>`;
    const a=ageAt(new Date(t));
    if(a!==null) s+=`<text x="${X(t)}" y="${mT+ph+34}" text-anchor="middle" fill="#555" font-size="13">${Math.floor(a)}歳</text>`;
  }
  const bw=Math.max(3,Math.min(10,pw/Math.max(uprot.length*3,40)));
  for(const p of uprot){
    const t=p.d.getTime(); if(t<t0||t>t1)continue;
    s+=`<rect x="${X(t)-bw/2}" y="${Yu(p.v)}" width="${bw}" height="${mT+ph-Yu(p.v)}" fill="#b3b378" opacity=".55"><title>${fmtD(p.d)} 尿蛋白 ${p.v} g</title></rect>`;
  }
  let reachRow=0;
  regs.forEach(r=>{
    const reg=r.reg;
    let te=t1; const hit0=reg.when(0); if(hit0&&hit0.getTime()<te) te=hit0.getTime();
    const ts=Math.max(t0,r.s.getTime());
    s+=`<line x1="${X(ts)}" y1="${Y(reg.at(ts))}" x2="${X(te)}" y2="${Y(reg.at(te))}" stroke="#c0202a" stroke-width="2.2"/>`;
    const w=reg.when(10);
    if(w&&w.getTime()>ts&&w.getTime()<=t1){
      s+=`<line x1="${X(w)}" y1="${Y(10)}" x2="${X(w)}" y2="${mT+ph}" stroke="#c0202a" stroke-dasharray="3 3"/>`;
      const a=ageAt(w);
      const row=reachRow++; // 直線ごとに段をずらす
      s+=`<text x="${X(w)}" y="${mT+ph+50+row*15}" text-anchor="middle" fill="#c0202a" font-weight="bold" font-size="13">${a!==null?fmtAge(a):fmtD(w)}</text>`;
    }
  });
  for(const p of egfr){
    const t=p.d.getTime(); if(t<t0||t>t1)continue;
    s+=`<circle cx="${X(t)}" cy="${Y(p.v)}" r="4" fill="#8fb3e0"><title>${fmtD(p.d)} eGFR ${p.v}</title></circle>`;
  }
  s+=`<rect id="selRect" x="0" y="${mT}" width="0" height="${ph}" fill="#ef9229" opacity=".18" pointer-events="none"/>`;
  s+=`<rect x="${mL}" y="${mT}" width="${pw}" height="${ph}" fill="none" stroke="#445"/>`;
  s+='</svg>';
  el.innerHTML=s;
  attachDrag();

  const last=egfr[egfr.length-1];
  document.getElementById('stat').textContent=
    `データ数: ${egfr.length}点 ｜ 期間: ${fmtD(egfr[0].d)} 〜 ${fmtD(last.d)} ｜ 最新 eGFR ${last.v}`+
    (ageAt(last.d)!==null?`（${fmtAge(ageAt(last.d))}時点）`:'');
}

/* ---------- ドラッグで回帰範囲選択 ---------- */
function attachDrag(){
  const svg=document.getElementById('plotSvg'); if(!svg) return;
  const sel=svg.querySelector('#selRect');
  let dragging=false, x1=0;
  const pxToSvgX=(clientX)=>{
    const r=svg.getBoundingClientRect();
    return (clientX-r.left)/r.width*view.W;
  };
  const svgXToTime=(sx)=>{
    const pw=view.W-view.mL-view.mR;
    return view.t0+(sx-view.mL)/pw*(view.t1-view.t0);
  };
  const start=e=>{dragging=true;x1=pxToSvgX(e.clientX??e.touches[0].clientX);sel.setAttribute('x',x1);sel.setAttribute('width',0);};
  const move=e=>{
    if(!dragging)return;
    const x2=pxToSvgX(e.clientX??e.touches[0].clientX);
    sel.setAttribute('x',Math.min(x1,x2)); sel.setAttribute('width',Math.abs(x2-x1));
  };
  const end=e=>{
    if(!dragging)return; dragging=false;
    const x2=pxToSvgX(e.clientX??(e.changedTouches&&e.changedTouches[0].clientX)??x1);
    sel.setAttribute('width',0);
    if(Math.abs(x2-x1)<8) return; // クリックは無視
    const ta=svgXToTime(Math.min(x1,x2)), tb=svgXToTime(Math.max(x1,x2));
    addRegression(new Date(ta),new Date(tb),true);
  };
  svg.addEventListener('mousedown',start); svg.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
  svg.addEventListener('touchstart',start,{passive:true}); svg.addEventListener('touchmove',move,{passive:true});
  svg.addEventListener('touchend',end);
}

function addRegression(s,e,silent){
  const pts=egfr.filter(p=>p.d>=s&&p.d<=e);
  if(pts.length<2){ if(!silent) alert('指定範囲内のデータが2点未満です'); return; }
  const reg=linReg(pts); if(!reg) return;
  regs.push({s,e,reg}); renderRegList(); draw();
}

function renderRegList(){
  const el=document.getElementById('regList'); el.innerHTML='';
  regs.forEach((r,i)=>{
    const reg=r.reg, w15=reg.when(15), w10=reg.when(10);
    const div=document.createElement('div'); div.className='regline';
    const ageStr=w=>w?(ageAt(w)!==null?fmtAge(ageAt(w))+'（'+fmtD(w)+'）':fmtD(w)):'到達せず（傾き≧0）';
    const rangeAge = ageAt(r.s)!==null ? `（${fmtAge(ageAt(r.s))}〜${fmtAge(ageAt(r.e))}）`:'';
    div.innerHTML=`<b>傾き ${i+1}</b>：${fmtD(r.s)} 〜 ${fmtD(r.e)} ${rangeAge}（n=${reg.n}）
      <button class="del" data-i="${i}">削除</button>
      <div class="meta">傾き <span class="slope">${reg.slope.toFixed(2)} /年</span><br>
      eGFR 15 到達予測：${ageStr(w15)}<br>eGFR 10 到達予測：${ageStr(w10)}</div>`;
    el.appendChild(div);
  });
  el.querySelectorAll('.del').forEach(b=>b.onclick=()=>{regs.splice(+b.dataset.i,1);renderRegList();draw();});
}

/* ---------- 年齢⇔日付の双方向リンク ---------- */
function linkAge(dateId,ageId){
  const dEl=document.getElementById(dateId), aEl=document.getElementById(ageId);
  aEl.addEventListener('change',()=>{
    const d=dateAtAge(parseFloat(aEl.value));
    if(d){ dEl.valueAsDate=d; draw(); } else alert('先に生年月日を入力してください');
  });
  dEl.addEventListener('change',()=>{
    const a=dEl.valueAsDate?ageAt(dEl.valueAsDate):null;
    if(a!==null&&isFinite(a)) aEl.value=a.toFixed(1);
    draw();
  });
}
linkAge('xStart','xStartAge'); linkAge('xEnd','xEndAge');
linkAge('regStart','regStartAge'); linkAge('regEnd','regEndAge');

/* ---------- ボタン ---------- */
document.getElementById('plotBtn').onclick=()=>{
  const r1=smartParse(document.getElementById('egfrInput').value);
  const r2=smartParse(document.getElementById('upInput').value);
  egfr=r1.data; uprot=r2.data;
  document.getElementById('egfrParsed').textContent=
    egfr.length?`✓ ${egfr.length}点を認識（${r1.note}）`:'⚠ データを認識できませんでした';
  draw();
};
document.getElementById('addRegBtn').onclick=()=>{
  const s=document.getElementById('regStart').valueAsDate, e=document.getElementById('regEnd').valueAsDate;
  if(!s||!e||!egfr.length){alert('データのプロットと範囲の指定が必要です');return;}
  addRegression(s,e,false);
};
document.getElementById('dob').addEventListener('change',draw);
document.getElementById('printBtn').onclick=()=>{
  const el=document.getElementById('printSummary');
  let h='<h3>腎機能（eGFR）の経過について</h3>'
    +'<p>青い点は腎機能の指標であるeGFR（推算糸球体ろ過量）の検査値です。背景の色は腎臓の働きの段階（緑：良好 〜 赤：低下）を表しています。棒グラフは尿蛋白の量です。</p>';
  if(regs.length){
    h+='<h3>腎機能の傾き</h3>';
    regs.forEach((r,i)=>{
      const sl=r.reg.slope;
      h+=`<p>傾き ${i+1}（${fmtD(r.s)} 〜 ${fmtD(r.e)}）：この期間、eGFRは1年あたり約 ${Math.abs(sl).toFixed(1)} ${sl<0?'低下':'上昇'}しています。赤い線はこのペースが続いた場合の見込みです。</p>`;
    });
    h+='<p style="margin-top:14px">腎機能の低下をゆるやかにするには、血圧・塩分・血糖の管理、薬の継続、定期的な検査が大切です。経過は治療によって変わりますので、一緒に取り組んでいきましょう。</p>';
  }
  const n=new Date();
  h+=`<p style="text-align:right">はら内科医院　${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日</p>`;
  el.innerHTML=h;
  window.print();
};

document.getElementById('demoBtn').onclick=()=>{
  let eg='',up='';
  let v=72; const start=new Date(2016,0,15);
  for(let i=0;i<60;i++){
    const d=new Date(start); d.setMonth(d.getMonth()+i*2);
    v-=(i<30?0.55:0.30)+(Math.random()-0.5)*1.2;
    eg+=fmtD(d)+'\t'+v.toFixed(1)+'\n';
    if(i%4===0) up+=fmtD(d)+'\t'+(Math.max(0.1,0.5+i*0.05+(Math.random()-0.5))).toFixed(1)+'\n';
  }
  document.getElementById('egfrInput').value=eg;
  document.getElementById('upInput').value=up;
  document.getElementById('dob').value='1954-05-01';
  document.getElementById('plotBtn').click();
};
(function(){const n=new Date();document.getElementById('todayLabel').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日 現在';})();
draw();
