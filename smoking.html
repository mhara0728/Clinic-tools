<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>禁煙学クイズ</title>
    <meta name="description" content="禁煙学改訂5版に基づく4択クイズアプリ。サクサク解いて効率よく学習。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
/* ===== リセット・基本設定 ===== */
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: rgba(30, 41, 59, 0.7);
    --bg-card-hover: rgba(51, 65, 85, 0.5);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #3b82f6;
    --accent-blue-glow: rgba(59, 130, 246, 0.3);
    --accent-green: #10b981;
    --accent-green-glow: rgba(16, 185, 129, 0.3);
    --accent-red: #ef4444;
    --accent-red-glow: rgba(239, 68, 68, 0.3);
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
    --border-subtle: rgba(148, 163, 184, 0.12);
    --border-active: rgba(59, 130, 246, 0.4);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
    --shadow-glow-blue: 0 0 20px rgba(59, 130, 246, 0.15);
    --shadow-glow-green: 0 0 20px rgba(16, 185, 129, 0.15);
    --font-main: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    --transition-fast: 0.15s ease;
    --transition-normal: 0.3s ease;
}

html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
}

body {
    font-family: var(--font-main);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ===== 背景グラデーション ===== */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
}

/* ===== 画面の切り替え ===== */
.screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    animation: fadeIn 0.3s ease;
}

.screen.active {
    display: flex;
    flex-direction: column;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== スタート画面 ===== */
.start-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
}

.app-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.start-container h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 2rem;
}

.start-stats {
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 340px;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text-secondary);
}

.start-stats .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.start-stats .stat-value {
    color: var(--text-primary);
    font-weight: 600;
}

.start-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    max-width: 340px;
}

/* ===== ボタン ===== */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    border: none;
    border-radius: var(--radius-md);
    padding: 1rem 1.5rem;
    font-family: var(--font-main);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-normal);
    -webkit-tap-highlight-color: transparent;
}

.btn:active {
    transform: scale(0.97);
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent-blue), #2563eb);
    color: white;
    box-shadow: var(--shadow-glow-blue);
}

.btn-primary:hover {
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
}

.btn-secondary {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border-subtle);
}

.btn-secondary:hover {
    border-color: var(--border-active);
    background: var(--bg-card-hover);
}

.btn-accent {
    background: linear-gradient(135deg, var(--accent-green), #059669);
    color: white;
    box-shadow: var(--shadow-glow-green);
}

.btn-ghost {
    background: transparent;
    color: var(--text-muted);
    font-weight: 500;
    font-size: 0.85rem;
    padding: 0.75rem;
}

.btn-ghost:hover {
    color: var(--text-secondary);
}

.btn-icon {
    font-size: 1.1rem;
}

/* ===== クイズ画面 ===== */
.quiz-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10, 14, 26, 0.9);
    backdrop-filter: blur(12px);
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border-subtle);
}

.progress-info {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-secondary);
}

#score-text {
    color: var(--accent-green);
    font-weight: 600;
}

.progress-bar-container {
    width: 100%;
    height: 4px;
    background: rgba(148, 163, 184, 0.15);
    border-radius: 2px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
    border-radius: 2px;
    transition: width var(--transition-normal);
    width: 0%;
}

.quiz-body {
    flex: 1;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

/* ===== 問題カード ===== */
.question-card {
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    box-shadow: var(--shadow-card);
}

.question-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--accent-blue);
    background: rgba(59, 130, 246, 0.12);
    padding: 0.25rem 0.6rem;
    border-radius: 999px;
    margin-bottom: 0.75rem;
    letter-spacing: 0.02em;
}

.question-text {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.7;
    color: var(--text-primary);
}

/* ===== 選択肢 ===== */
.options-container {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
}

.option-btn {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    width: 100%;
    text-align: left;
    background: var(--bg-card);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 1rem 1.2rem;
    font-family: var(--font-main);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    transition: all var(--transition-fast);
    -webkit-tap-highlight-color: transparent;
    line-height: 1.6;
}

.option-btn:active {
    transform: scale(0.98);
}

.option-btn:hover:not(.answered) {
    border-color: var(--border-active);
    background: var(--bg-card-hover);
}

.option-label {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 1.8rem;
    height: 1.8rem;
    border-radius: 50%;
    background: rgba(148, 163, 184, 0.12);
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-secondary);
    flex-shrink: 0;
    transition: all var(--transition-fast);
}

.option-text {
    flex: 1;
    padding-top: 0.15rem;
}

/* 正解・不正解のスタイル */
.option-btn.correct {
    background: rgba(16, 185, 129, 0.12);
    border-color: var(--accent-green);
    box-shadow: 0 0 16px rgba(16, 185, 129, 0.1);
}

.option-btn.correct .option-label {
    background: var(--accent-green);
    color: white;
}

.option-btn.wrong {
    background: rgba(239, 68, 68, 0.1);
    border-color: var(--accent-red);
}

.option-btn.wrong .option-label {
    background: var(--accent-red);
    color: white;
}

.option-btn.answered {
    cursor: default;
    pointer-events: none;
}

.option-btn.dimmed {
    opacity: 0.45;
}

/* ===== 解説カード ===== */
.explanation-card {
    background: rgba(59, 130, 246, 0.06);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: var(--radius-md);
    padding: 1.2rem;
    animation: slideUp 0.3s ease;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

.explanation-header {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
}

.explanation-header.correct-header {
    color: var(--accent-green);
}

.explanation-header.wrong-header {
    color: var(--accent-red);
}

.explanation-text {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text-secondary);
}

/* ===== クイズフッター ===== */
.quiz-footer {
    padding: 1rem 1.25rem;
    display: flex;
    gap: 0.75rem;
    border-top: 1px solid var(--border-subtle);
    background: rgba(10, 14, 26, 0.9);
    backdrop-filter: blur(12px);
}

.btn-next {
    flex: 1;
}

.btn-home {
    padding: 1rem;
}

/* ===== 結果画面 ===== */
.result-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
}

.result-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
}

.result-container h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: var(--text-primary);
}

.result-score {
    font-size: 3rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
}

.result-details {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 2rem;
    line-height: 1.8;
}

.result-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    max-width: 340px;
}

/* ===== レスポンシブ ===== */
@media (min-width: 600px) {
    .quiz-body {
        max-width: 560px;
        margin: 0 auto;
        width: 100%;
    }
    
    .start-container,
    .result-container {
        max-width: 480px;
        margin: 0 auto;
    }
}

</style>
</head>
<body>
    <!-- ===== スタート画面 ===== -->
    <div id="screen-start" class="screen active">
        <div class="start-container">
            <div class="app-icon">🚭</div>
            <h1>禁煙学クイズ</h1>
            <p class="subtitle">改訂5版 対応</p>
            <div class="start-stats" id="start-stats"></div>
            <div class="start-buttons">
                <button id="btn-start-all" class="btn btn-primary" onclick="startQuiz('all')">
                    <span class="btn-icon">📝</span>
                    全問チャレンジ
                </button>
                <button id="btn-start-wrong" class="btn btn-secondary" onclick="startQuiz('wrong')" style="display:none;">
                    <span class="btn-icon">🔄</span>
                    間違えた問題だけ
                </button>
                <button id="btn-resume" class="btn btn-accent" onclick="startQuiz('resume')" style="display:none;">
                    <span class="btn-icon">▶️</span>
                    前回の続きから
                </button>
                <button id="btn-reset" class="btn btn-ghost" onclick="resetProgress()" style="display:none;">
                    <span class="btn-icon">🗑️</span>
                    学習記録をリセット
                </button>
            </div>
        </div>
    </div>

    <!-- ===== クイズ画面 ===== -->
    <div id="screen-quiz" class="screen">
        <div class="quiz-header">
            <div class="progress-info">
                <span id="progress-text">1 / 12</span>
                <span id="score-text">正解: 0</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div class="quiz-body">
            <div class="question-card" id="question-card">
                <div class="question-badge" id="question-badge">試験問題例</div>
                <p class="question-text" id="question-text"></p>
            </div>

            <div class="options-container" id="options-container"></div>

            <div class="explanation-card" id="explanation-card" style="display:none;">
                <div class="explanation-header" id="explanation-header"></div>
                <p class="explanation-text" id="explanation-text"></p>
            </div>
        </div>

        <div class="quiz-footer">
            <button class="btn btn-primary btn-next" id="btn-next" onclick="nextQuestion()" style="display:none;">
                次の問題へ →
            </button>
            <button class="btn btn-ghost btn-home" id="btn-home" onclick="goHome()">
                ホームに戻る
            </button>
        </div>
    </div>

    <!-- ===== 結果画面 ===== -->
    <div id="screen-result" class="screen">
        <div class="result-container">
            <div class="result-icon" id="result-icon">🎉</div>
            <h2 id="result-title">お疲れ様でした！</h2>
            <div class="result-score" id="result-score"></div>
            <div class="result-details" id="result-details"></div>
            <div class="result-buttons">
                <button class="btn btn-primary" onclick="startQuiz('wrong')">
                    <span class="btn-icon">🔄</span>
                    間違えた問題を復習
                </button>
                <button class="btn btn-secondary" onclick="startQuiz('all')">
                    <span class="btn-icon">📝</span>
                    もう一度最初から
                </button>
                <button class="btn btn-ghost" onclick="goHome()">
                    ホームに戻る
                </button>
            </div>
        </div>
    </div>

    <script>
/**
 * 禁煙学クイズ アプリケーション
 * - 全問チャレンジ / 間違えた問題のみ / 前回の続きから の3モード
 * - LocalStorageによる進捗保存
 */

// ===== 状態管理 =====
let allQuestions = [];
let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongIds = [];
let answered = false;
let quizMode = 'all';

const STORAGE_KEY = 'kinen_quiz_state';

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', async () => {
    await loadQuestions();
    updateStartScreen();
});

async function loadQuestions() {
    allQuestions = [
  {
    "id": "c1_01",
    "chapter": "第1章 喫煙の医学",
    "type": "check",
    "question": "タバコ煙に含まれる化学物質の種類数として正しいものはどれか。",
    "options": [
      "約100種類",
      "約1,000種類",
      "約5,300種類",
      "約50,000種類"
    ],
    "answer": 2,
    "explanation": "主流煙の粒子成分が約4,300種類、ガス成分が約1,000種類の合計約5,300種類とされています。"
  },
  {
    "id": "c1_02",
    "chapter": "第1章 喫煙の医学",
    "type": "check",
    "question": "タバコの3つの特性として正しい組み合わせはどれか。",
    "options": [
      "依存性・有害性・魅惑性",
      "依存性・発がん性・中毒性",
      "有害性・魅惑性・致死性",
      "中毒性・発がん性・魅惑性"
    ],
    "answer": 0,
    "explanation": "タバコは依存性(addictiveness)、有害性(toxicity)、魅惑性(attractiveness)の3つの特性を有しています。"
  },
  {
    "id": "c1_03",
    "chapter": "第1章 喫煙の医学",
    "type": "general",
    "question": "ニコチン依存のメカニズムとして正しいものはどれか。",
    "options": [
      "ニコチンがセロトニン受容体に結合する",
      "ニコチンがα4β2受容体に結合しドパミンが放出される",
      "ニコチンがGABA受容体を遮断する",
      "ニコチンがアドレナリン受容体に結合する"
    ],
    "answer": 1,
    "explanation": "ニコチンが脳内のα4β2ニコチン受容体に結合するとドパミンが放出され快感が生じ、これが依存の主要なメカニズムです。"
  },
  {
    "id": "c1_04",
    "chapter": "第1章 喫煙の医学",
    "type": "general",
    "question": "タバコ煙の代表的な有害物質でないものはどれか。",
    "options": [
      "一酸化炭素",
      "ベンゼン",
      "カフェイン",
      "ホルムアルデヒド"
    ],
    "answer": 2,
    "explanation": "代表的な有害物質にはニコチン、一酸化炭素、ベンゼン、ホルムアルデヒド、タバコ特異的ニトロソアミンなどがあります。カフェインは含まれません。"
  },
  {
    "id": "c1_05",
    "chapter": "第1章 喫煙の医学",
    "type": "general",
    "question": "タバコの主流煙と副流煙について正しいものはどれか。",
    "options": [
      "主流煙は喫煙者が吸い込む煙である",
      "副流煙は喫煙者が吐き出す煙のみを指す",
      "主流煙のほうが副流煙より有害物質濃度が高い",
      "副流煙にはニコチンが含まれない"
    ],
    "answer": 0,
    "explanation": "主流煙は喫煙者が直接吸い込む煙で、副流煙はタバコの先端から立ち上がる煙です。副流煙には主流煙より高濃度の有害物質が含まれます。"
  },
  {
    "id": "c1_06",
    "chapter": "第1章 喫煙の医学",
    "type": "general",
    "question": "ニコチンの血中半減期として正しいものはどれか。",
    "options": [
      "約10分",
      "約2時間",
      "約12時間",
      "約24時間"
    ],
    "answer": 1,
    "explanation": "ニコチンの血中半減期は約2時間です。このため喫煙者は定期的にタバコを吸いたくなります。"
  },
  {
    "id": "c1_07",
    "chapter": "第1章 喫煙の医学",
    "type": "general",
    "question": "タバコ特異的ニトロソアミン(TSNA)について正しいものはどれか。",
    "options": [
      "タバコ煙にのみ含まれる発がん物質である",
      "食品にも広く含まれる物質である",
      "無害な物質である",
      "タバコの香りの元となる物質である"
    ],
    "answer": 0,
    "explanation": "タバコ特異的ニトロソアミン(TSNA)はタバコ煙に特有の発がん物質で、NNKやNNNなどが代表的です。"
  },
  {
    "id": "c1_08",
    "chapter": "第1章 喫煙の医学",
    "type": "general",
    "question": "喫煙による一酸化炭素(CO)の影響として正しいものはどれか。",
    "options": [
      "COはヘモグロビンとの結合力が酸素の200倍以上である",
      "COは体内で速やかに分解される",
      "COは肺にのみ影響する",
      "COの半減期は約24時間である"
    ],
    "answer": 0,
    "explanation": "一酸化炭素はヘモグロビンとの結合力が酸素の約200〜250倍あり、組織への酸素供給を阻害します。"
  },
  {
    "id": "c1_09",

// ===== LocalStorage =====
function saveState() {
    const state = {
        quizMode,
        currentIndex,
        correctCount,
        wrongIds,
        questionIds: currentQuestions.map(q => q.id),
        totalAnswered: getTotalAnswered(),
        totalCorrect: getTotalCorrect(),
        allWrongIds: getAllWrongIds()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
    } catch {
        return null;
    }
}

function getTotalAnswered() {
    const state = loadState();
    return state ? (state.totalAnswered || 0) : 0;
}

function getTotalCorrect() {
    const state = loadState();
    return state ? (state.totalCorrect || 0) : 0;
}

function getAllWrongIds() {
    const state = loadState();
    return state ? (state.allWrongIds || []) : [];
}

function resetProgress() {
    if (confirm('学習記録をすべてリセットしますか？')) {
        localStorage.removeItem(STORAGE_KEY);
        updateStartScreen();
    }
}

// ===== スタート画面 =====
function updateStartScreen() {
    const state = loadState();
    const statsEl = document.getElementById('start-stats');
    const btnResume = document.getElementById('btn-resume');
    const btnWrong = document.getElementById('btn-start-wrong');
    const btnReset = document.getElementById('btn-reset');

    // 統計情報の表示
    const totalQ = allQuestions.length;
    if (state && state.totalAnswered > 0) {
        const rate = state.totalCorrect > 0 
            ? Math.round((state.totalCorrect / state.totalAnswered) * 100) 
            : 0;
        statsEl.innerHTML = `
            <div class="stat-row"><span>全問題数</span><span class="stat-value">${totalQ}問</span></div>
            <div class="stat-row"><span>累計回答数</span><span class="stat-value">${state.totalAnswered}回</span></div>
            <div class="stat-row"><span>累計正答率</span><span class="stat-value">${rate}%</span></div>
            <div class="stat-row"><span>間違えた問題</span><span class="stat-value">${state.allWrongIds ? state.allWrongIds.length : 0}問</span></div>
        `;
    } else {
        statsEl.innerHTML = `
            <div class="stat-row"><span>全問題数</span><span class="stat-value">${totalQ}問</span></div>
            <div class="stat-row"><span>学習を始めましょう！</span><span class="stat-value">📚</span></div>
        `;
    }

    // レジュームボタンの表示
    if (state && state.currentIndex > 0 && state.questionIds && state.currentIndex < state.questionIds.length) {
        btnResume.style.display = 'flex';
        btnResume.querySelector('.btn-icon').nextSibling.textContent = 
            ` 前回の続きから (${state.currentIndex + 1}/${state.questionIds.length})`;
    } else {
        btnResume.style.display = 'none';
    }

    // 間違えた問題ボタン
    const wrongList = state ? (state.allWrongIds || []) : [];
    if (wrongList.length > 0) {
        btnWrong.style.display = 'flex';
        btnReset.style.display = 'flex';
    } else {
        btnWrong.style.display = 'none';
        btnReset.style.display = state && state.totalAnswered > 0 ? 'flex' : 'none';
    }
}

// ===== クイズ開始 =====
function startQuiz(mode) {
    quizMode = mode;
    correctCount = 0;
    wrongIds = [];
    currentIndex = 0;

    if (mode === 'resume') {
        const state = loadState();
        if (state && state.questionIds) {
            currentQuestions = state.questionIds.map(id => allQuestions.find(q => q.id === id)).filter(Boolean);
            currentIndex = state.currentIndex || 0;
            correctCount = state.correctCount || 0;
            wrongIds = state.wrongIds || [];
        } else {
            currentQuestions = shuffleArray([...allQuestions]);
        }
    } else if (mode === 'wrong') {
        const allWrong = getAllWrongIds();
        currentQuestions = allWrong.map(id => allQuestions.find(q => q.id === id)).filter(Boolean);
        if (currentQuestions.length === 0) {
            alert('間違えた問題がありません！');
            return;
        }
        currentQuestions = shuffleArray(currentQuestions);
    } else {
        currentQuestions = shuffleArray([...allQuestions]);
    }

    showScreen('screen-quiz');
    showQuestion();
}

// ===== 画面遷移 =====
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    window.scrollTo(0, 0);
}

function goHome() {
    showScreen('screen-start');
    updateStartScreen();
}

// ===== 問題表示 =====
function showQuestion() {
    if (currentIndex >= currentQuestions.length) {
        showResult();
        return;
    }

    answered = false;
    const q = currentQuestions[currentIndex];
    
    // プログレス更新
    document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
    document.getElementById('score-text').textContent = `正解: ${correctCount}`;
    document.getElementById('progress-bar').style.width = `${((currentIndex) / currentQuestions.length) * 100}%`;

    // バッジ
    const badge = document.getElementById('question-badge');
    if (q.type === 'exam') {
        badge.textContent = '試験問題例';
        badge.style.color = 'var(--accent-amber)';
        badge.style.background = 'rgba(245, 158, 11, 0.12)';
    } else if (q.type === 'check') {
        badge.textContent = 'Check!';
        badge.style.color = 'var(--accent-green)';
        badge.style.background = 'rgba(16, 185, 129, 0.12)';
    } else {
        badge.textContent = q.chapter;
        badge.style.color = 'var(--accent-blue)';
        badge.style.background = 'rgba(59, 130, 246, 0.12)';
    }

    // 問題文
    document.getElementById('question-text').textContent = q.question;

    // 選択肢
    const labels = ['A', 'B', 'C', 'D'];
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `
            <span class="option-label">${labels[idx]}</span>
            <span class="option-text">${opt}</span>
        `;
        btn.addEventListener('click', () => selectAnswer(idx));
        container.appendChild(btn);
    });

    // 解説・次へボタンを隠す
    document.getElementById('explanation-card').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
}

// ===== 回答選択 =====
function selectAnswer(selectedIdx) {
    if (answered) return;
    answered = true;

    const q = currentQuestions[currentIndex];
    const isCorrect = selectedIdx === q.answer;
    const buttons = document.querySelectorAll('.option-btn');

    // 全ボタンを回答済みにする
    buttons.forEach((btn, idx) => {
        btn.classList.add('answered');
        if (idx === q.answer) {
            btn.classList.add('correct');
        } else if (idx === selectedIdx && !isCorrect) {
            btn.classList.add('wrong');
        } else {
            btn.classList.add('dimmed');
        }
    });

    // カウント更新
    if (isCorrect) {
        correctCount++;
        // 正解した場合、allWrongIdsから削除
        const state = loadState();
        if (state && state.allWrongIds) {
            state.allWrongIds = state.allWrongIds.filter(id => id !== q.id);
            state.totalAnswered = (state.totalAnswered || 0) + 1;
            state.totalCorrect = (state.totalCorrect || 0) + 1;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }
    } else {
        wrongIds.push(q.id);
        // 不正解をallWrongIdsに追加
        const state = loadState() || {};
        const allWrong = state.allWrongIds || [];
        if (!allWrong.includes(q.id)) {
            allWrong.push(q.id);
        }
        state.allWrongIds = allWrong;
        state.totalAnswered = (state.totalAnswered || 0) + 1;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    document.getElementById('score-text').textContent = `正解: ${correctCount}`;

    // 解説表示
    const explCard = document.getElementById('explanation-card');
    const explHeader = document.getElementById('explanation-header');
    const explText = document.getElementById('explanation-text');

    explHeader.textContent = isCorrect ? '✅ 正解！' : '❌ 不正解';
    explHeader.className = `explanation-header ${isCorrect ? 'correct-header' : 'wrong-header'}`;
    explText.textContent = q.explanation;
    explCard.style.display = 'block';

    // 次へボタン表示
    const btnNext = document.getElementById('btn-next');
    if (currentIndex < currentQuestions.length - 1) {
        btnNext.textContent = '次の問題へ →';
    } else {
        btnNext.textContent = '結果を見る 🎯';
    }
    btnNext.style.display = 'flex';

    // 進捗保存
    saveProgressState();

    // 解説が見えるようにスクロール
    setTimeout(() => {
        explCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
}

function saveProgressState() {
    const state = loadState() || {};
    state.quizMode = quizMode;
    state.currentIndex = currentIndex + 1; // 次の問題のインデックスを保存
    state.correctCount = correctCount;
    state.wrongIds = wrongIds;
    state.questionIds = currentQuestions.map(q => q.id);
    state.totalAnswered = state.totalAnswered || 0;
    state.totalCorrect = state.totalCorrect || 0;
    state.allWrongIds = state.allWrongIds || [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ===== 次の問題 =====
function nextQuestion() {
    currentIndex++;
    if (currentIndex >= currentQuestions.length) {
        showResult();
    } else {
        showQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

// ===== 結果画面 =====
function showResult() {
    const total = currentQuestions.length;
    const rate = Math.round((correctCount / total) * 100);

    let icon, title;
    if (rate >= 90) { icon = '🏆'; title = '素晴らしい！'; }
    else if (rate >= 70) { icon = '🎉'; title = 'よくできました！'; }
    else if (rate >= 50) { icon = '💪'; title = 'もう少し！'; }
    else { icon = '📖'; title = '復習しましょう！'; }

    document.getElementById('result-icon').textContent = icon;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-score').textContent = `${rate}%`;
    document.getElementById('result-details').innerHTML = `
        ${correctCount} / ${total} 問正解<br>
        間違えた問題: ${wrongIds.length}問
    `;

    // 間違えた問題がない場合、復習ボタンを隠す
    const resultBtns = document.querySelector('.result-buttons');
    const wrongBtn = resultBtns.querySelector('button:first-child');
    wrongBtn.style.display = wrongIds.length > 0 ? 'flex' : 'none';

    // レジューム状態をクリア（完了したので）
    const state = loadState() || {};
    state.currentIndex = 0;
    state.questionIds = null;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    showScreen('screen-result');
}

// ===== ユーティリティ =====
function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
