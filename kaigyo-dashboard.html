<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はら内科医院 開業ダッシュボード</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap');
:root{
  --bg:#F7F5EE;--card:#FFFFFF;--ink:#2C2A24;--sub:#7C7568;--line:#E7E2D6;
  --orange:#E8922F;--orange-soft:#FCEBD5;--lime:#8FBE33;--lime-soft:#EDF4DA;
  --green:#3AA168;--green-soft:#E4F3EA;--teal:#3C9E8C;--danger:#C15B4E;--blue:#3a66b8;--blue-soft:#EAF0F6;
  --shadow:0 2px 10px rgba(60,50,30,.06);--shadow-lg:0 8px 30px rgba(60,50,30,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN',sans-serif}
body{max-width:960px;margin:0 auto;padding-bottom:80px}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.num{font-family:'Zen Kaku Gothic New',sans-serif}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ヒーロー */
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#3AA168 0%,#3C9E8C 55%,#2f8f7d 100%);
  color:#fff;padding:24px 22px 28px;border-radius:0 0 26px 26px;box-shadow:var(--shadow-lg)}
.hero::after{content:"";position:absolute;width:220px;height:220px;border-radius:0 50% 0 50%;background:rgba(255,255,255,.07);top:-90px;right:-60px;transform:rotate(18deg)}
.hero::before{content:"";position:absolute;width:150px;height:150px;border-radius:0 50% 0 50%;background:rgba(255,255,255,.05);bottom:-70px;left:30px;transform:rotate(200deg)}
.hero-top{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.hero-top img{width:44px;height:44px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.hero-title{font-size:18px;font-weight:900;letter-spacing:.04em}
.hero-sub{font-size:12px;opacity:.9;margin-top:1px}
.countdown{position:relative;z-index:1;margin-top:16px;text-align:center}
.cd-label{font-size:12px;letter-spacing:.28em;opacity:.92}
.cd-main{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-top:2px}
.cd-days{font-size:60px;font-weight:900;line-height:1;letter-spacing:-.02em}
.cd-unit{font-size:19px;font-weight:700}
.cd-date{font-size:13px;opacity:.95;margin-top:6px;cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.5);display:inline-block;padding-bottom:1px}
.cd-bar{margin:14px auto 0;max-width:520px;height:8px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}
.cd-bar>div{height:100%;background:#fff;border-radius:99px;transition:width .6s}
.cd-bar-label{font-size:11px;opacity:.85;margin-top:6px}

/* タブ */
.tabs{display:flex;gap:5px;padding:14px 14px 0;position:sticky;top:0;background:var(--bg);z-index:20}
.tab{flex:1;border:none;background:transparent;padding:10px 2px 12px;border-radius:14px 14px 0 0;font-size:13px;font-weight:700;color:var(--sub);position:relative;transition:.15s}
.tab .ico{display:block;font-size:19px;margin-bottom:2px;line-height:1}
.tab.active{color:var(--ink);background:var(--card);box-shadow:0 -3px 10px rgba(60,50,30,.05)}
.tab.active::after{content:"";position:absolute;left:20%;right:20%;bottom:7px;height:3px;border-radius:99px;background:var(--orange)}
.panel{background:var(--card);margin:0 14px;border-radius:0 0 18px 18px;padding:16px 14px 22px;min-height:60vh;box-shadow:var(--shadow)}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.panel-head h2{font-size:16px;font-weight:900}
.btn{border:2px solid var(--line);background:#fff;border-radius:99px;padding:6px 13px;font-size:12.5px;font-weight:700;color:var(--green);white-space:nowrap}
.btn-sm{padding:4px 10px;font-size:11.5px}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
.btn-ghost{color:var(--sub)}

/* やること */
.phase{margin-bottom:20px}
.phase-head{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.phase-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.phase-title{font-size:14px;font-weight:900}
.phase-when{font-size:11.5px;color:var(--sub);font-weight:700;margin-left:auto;background:var(--bg);padding:3px 10px;border-radius:99px}
.phase-line{border-left:2px dashed var(--line);margin-left:5px;padding-left:18px;padding-top:2px}
.task{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.task:last-child{border-bottom:none}
.check{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:900;background:#fff}
.task.done .check{background:var(--green);border-color:var(--green)}
.task.done .task-name{text-decoration:line-through;color:var(--sub)}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:500;line-height:1.5}
.task-meta{font-size:11px;color:var(--sub);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px}
.chip.gov{background:var(--orange-soft);color:#b56a1c}
.chip.equip{background:var(--lime-soft);color:#5f7d18}
.chip.qual{background:var(--green-soft);color:#2c7d4f}
.chip.money{background:var(--blue-soft);color:var(--blue)}
.chip.other{background:#EDE9E0;color:var(--sub)}
.task-x{border:none;background:none;color:#cdc6b7;font-size:16px;padding:0 2px;flex-shrink:0}
.phase-add{margin-top:8px;margin-left:18px}

/* ガントチャート（PC向け） */
.gantt-wrap{display:none;margin-bottom:20px;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.gantt-scroll{overflow-x:auto}
.gantt{min-width:720px;font-size:11px}
.gantt-row{display:flex;border-bottom:1px solid var(--line)}
.gantt-row:last-child{border-bottom:none}
.gantt-row.head{position:sticky;top:0;background:var(--bg);font-weight:700;z-index:2}
.gantt-label{width:210px;flex-shrink:0;padding:7px 10px;border-right:1px solid var(--line);display:flex;align-items:center;gap:6px;background:var(--card)}
.gantt-row.head .gantt-label{background:var(--bg)}
.gantt-label .gcheck{width:16px;height:16px;border-radius:5px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:900;cursor:pointer}
.gantt-label.done .gcheck{background:var(--green);border-color:var(--green)}
.gantt-label .gname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.gantt-label.done .gname{text-decoration:line-through;color:var(--sub)}
.gantt-cells{display:flex;flex:1;position:relative}
.gantt-cell{flex:1;min-width:34px;border-right:1px solid #F0EDE4;padding:4px 0}
.gantt-cell.q{background:#FBFAF3}
.gantt-bar{position:absolute;height:15px;top:6px;border-radius:8px;opacity:.92}
.gantt-phasesep{border-top:2px solid var(--line)}
.gantt-hint{font-size:11px;color:var(--sub);padding:8px 12px;background:var(--bg)}
.gantt-open-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);z-index:1}
@media(min-width:760px){ .gantt-wrap{display:block} .tl-note{display:block} }
.tl-note{display:none;font-size:11.5px;color:var(--sub);margin:0 2px 14px}

/* 予算・準備品 共通ツリー */
.grp{margin-bottom:12px;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.grp-head{padding:11px 12px;font-weight:900;font-size:14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.grp-head.b{background:var(--lime-soft)}
.grp-head .g-sum{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--sub)}
.grp-head .caret{font-size:11px;color:var(--sub);transition:.2s}
.grp.closed .caret{transform:rotate(-90deg)}
.grp.closed .grp-body{display:none}
.grp-body{padding:2px 8px 10px}
.mid{margin-top:4px}
.mid-head{font-size:12.5px;font-weight:700;color:var(--teal);padding:8px 4px 3px;display:flex;align-items:center;gap:6px}
.mid-head .m-sum{margin-left:auto;color:var(--sub);font-weight:700}
.row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-radius:9px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row.dragging{opacity:.4}
.row.drag-over{background:var(--lime-soft)}
.grip{color:#c9c3b4;font-size:14px;cursor:grab;touch-action:none;flex-shrink:0}
.tcheck{width:19px;height:19px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900}
.row.got .tcheck{background:var(--lime);border-color:var(--lime)}
.r-name{flex:1;font-size:13.5px;min-width:0}
.r-name .sub{display:block;color:var(--sub);font-size:11px;margin-top:1px}
.r-name.got-text{color:var(--sub)}
.price{font-size:13.5px;font-weight:700;text-align:right;white-space:nowrap}
.price.cmp{font-size:12px;color:var(--sub);font-weight:500}
.price .diff{font-size:11px;font-weight:700;margin-left:5px}
.diff.up{color:var(--danger)}
.diff.down{color:var(--green)}
.diff.plan-up{color:var(--blue)}
.diff.plan-down{color:var(--teal)}
.status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap}
.status.fixed{background:var(--green-soft);color:#2c7d4f}
.status.tmp{background:var(--orange-soft);color:#b56a1c}
.r-x{border:none;background:none;color:#cdc6b7;font-size:15px;flex-shrink:0}
.memo-toggle{font-size:11px;color:var(--blue);background:none;border:none;padding:2px 0;font-weight:700}
.memo{display:none;margin:2px 4px 8px 30px;padding:9px 11px;background:var(--bg);border-radius:10px;font-size:12.5px;line-height:1.7;color:var(--ink);white-space:pre-wrap;word-break:break-word}
.memo.open{display:block}
.memo a{color:var(--blue);word-break:break-all}
.ometa-wrap{display:block;margin-top:3px}
.ometa{display:inline-block;font-size:10.5px;color:var(--teal);background:var(--green-soft);padding:1px 7px;border-radius:99px;margin-right:5px;font-weight:700}
.doc-btn{display:inline-block;font-size:10.5px;color:var(--blue);background:var(--blue-soft);padding:1px 8px;border-radius:99px;margin-right:5px;font-weight:700;text-decoration:none}
.brow .tcheck{cursor:pointer}
.mid-add,.grp-add{font-size:11.5px;color:var(--green);background:none;border:1.5px dashed var(--line);border-radius:8px;padding:5px 10px;font-weight:700;margin:6px 4px 2px}

/* 予算サマリー */
.bsum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
.bcard{background:var(--bg);border-radius:14px;padding:13px 10px;text-align:center}
.bcard .lbl{font-size:10.5px;color:var(--sub);font-weight:700}
.bcard .val{font-size:19px;font-weight:900;margin-top:3px}
.bcard.over .val{color:var(--danger)}
.bcard.under .val{color:var(--green)}
.run-wrap{margin-top:18px;border-top:2px dashed var(--line);padding-top:16px}
.run-title{font-size:14px;font-weight:900;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.run-total{margin-left:auto;color:#8B5FBF;background:#F1EAF9;padding:3px 12px;border-radius:99px;font-weight:900}

/* カレンダー */
.cal-item{display:flex;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line)}
.cal-date{flex-shrink:0;width:50px;text-align:center;background:var(--bg);border-radius:12px;padding:6px 3px;height:fit-content}
.cal-date .m{font-size:10.5px;color:var(--sub);font-weight:700}
.cal-date .d{font-size:21px;font-weight:900;line-height:1}
.cal-date .w{font-size:9.5px;color:var(--sub)}
.cal-body{flex:1;min-width:0}
.cal-title{font-size:14px;font-weight:700}
.cal-meta{font-size:12px;color:var(--sub);margin-top:2px;line-height:1.5}
.cal-actions{margin-top:5px;display:flex;gap:8px;align-items:center}
.cal-gcal{font-size:11px;color:var(--green);font-weight:700;text-decoration:none;border:1.5px solid var(--green-soft);background:var(--green-soft);padding:3px 10px;border-radius:99px}
.cal-x{border:none;background:none;color:#cdc6b7;font-size:14px}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(44,42,36,.5);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal-bg.active{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:slideup .22s}
@keyframes slideup{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.modal h3{font-size:16px;font-weight:900;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--sub);font-weight:700;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;font-size:15px;padding:11px 12px;border:2px solid var(--line);border-radius:12px;background:#fff}
.field textarea{resize:vertical;min-height:64px;line-height:1.6}
.field-row{display:flex;gap:9px}
.field-row .field{flex:1}
.modal-btns{display:flex;gap:9px;margin-top:6px}
.modal-btns button{flex:1;font-size:15px;font-weight:700;padding:13px;border-radius:99px;border:none}
.mb-cancel{background:var(--bg);color:var(--ink)}
.mb-ok{background:var(--green);color:#fff}
.mb-del{background:none;color:var(--danger);border:2px solid #E8CFCB!important;flex:0 0 auto!important;padding:13px 16px!important}

.empty{text-align:center;color:var(--sub);font-size:13px;padding:24px 0}
.save-hint{margin:14px 16px 0;text-align:center;font-size:11px;color:var(--sub)}
.sync{font-size:11px;margin-left:6px;opacity:.95;white-space:nowrap}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <img src="" data-logo alt="ロゴ">
    <div><div class="hero-title">はら内科医院 開業ダッシュボード</div>
    <div class="hero-sub">長岡京市久貝二丁目16-16 <span id="sync-status" class="sync"></span></div></div>
  </div>
  <div class="countdown">
    <div class="cd-label">開　院　ま　で</div>
    <div class="cd-main"><span class="cd-days num" id="cd-days">—</span><span class="cd-unit">日</span></div>
    <div class="cd-date" id="cd-date" onclick="editOpenDate()">🎯 2027年5月1日 開院予定（タップで変更）</div>
    <div class="cd-bar"><div id="cd-progress"></div></div>
    <div class="cd-bar-label">準備スタートから <span id="cd-pct">—</span>% 経過</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="todo" onclick="switchTab(this)"><span class="ico">✓</span>やること</button>
  <button class="tab" data-tab="budget" onclick="switchTab(this)"><span class="ico">¥</span>予算・手配</button>
  <button class="tab" data-tab="cal" onclick="switchTab(this)"><span class="ico">🗓</span>予定</button>
</div>

<div class="panel" id="tab-todo"></div>
<div class="panel" id="tab-budget" style="display:none"></div>
<div class="panel" id="tab-cal" style="display:none"></div>

<div class="save-hint">スプレッドシートに自動保存され、スマホ・PCで同じデータが見られます。</div>

<div class="modal-bg" id="modal"><div class="modal" id="modal-inner"></div></div>

/* ============ 金額フォーマット ============ */
function man(n){ // 円→「◯◯万」表記
  if(n==null||isNaN(n))return "—";
  if(n===0)return "0";
  const m=n/10000;
  if(Math.abs(m)>=10000){const oku=Math.floor(Math.abs(m)/10000);const rest=Math.round(Math.abs(m)%10000);return (n<0?"-":"")+oku+"億"+(rest?(","+String(rest).padStart(4,'0').replace(/^0+/,'')+"万"):"");}
  return (n<0?"-":"")+Math.round(Math.abs(m)).toLocaleString()+"万";
}
function yen(n){return "¥"+Math.round(n).toLocaleString();}

function ymToIdx(ym, months){return months.indexOf(ym);}
function buildMonths(){
  // 全タスクのstart/endとopenDateから月レンジを決定
  let all=[];
  D.todo.forEach(p=>p.tasks.forEach(t=>{if(t.start)all.push(t.start);if(t.end)all.push(t.end);}));
  all.push(D.openDate.slice(0,7));
  all.sort();
  if(!all.length)return [];
  const [sy,sm]=all[0].split('-').map(Number);
  const [ey,em]=all[all.length-1].split('-').map(Number);
  const months=[];
  let y=sy,mo=sm;
  while(y<ey||(y===ey&&mo<=em)){
    months.push(`${y}-${String(mo).padStart(2,'0')}`);
    mo++;if(mo>12){mo=1;y++;}
  }
  return months;
}
function renderGantt(){
  const months=buildMonths();
  if(!months.length)return '';
  const openYM=D.openDate.slice(0,7);
  // ヘッダー
  let head=`<div class="gantt-row head"><div class="gantt-label">タスク</div><div class="gantt-cells">`;
  months.forEach(ym=>{
    const [y,m]=ym.split('-');
    const isOpen=ym===openYM;
    head+=`<div class="gantt-cell ${isOpen?'q':''}" style="text-align:center;font-size:10px">${m}月<br><span style="color:var(--sub);font-weight:400">${y.slice(2)}</span></div>`;
  });
  head+=`</div></div>`;
  // 行
  let rows='';
  D.todo.forEach((ph,pi)=>{
    ph.tasks.forEach(t=>{
      const si=t.start?ymToIdx(t.start,months):-1;
      const ei=t.end?ymToIdx(t.end,months):si;
      let bar='';
      if(si>=0){
        const leftPct=(si/months.length)*100;
        const widPct=((ei-si+1)/months.length)*100;
        bar=`<div class="gantt-bar" style="left:${leftPct}%;width:${widPct}%;background:${ph.color}"></div>`;
      }
      const cells=months.map(ym=>`<div class="gantt-cell ${ym===openYM?'q':''}"></div>`).join('');
      rows+=`<div class="gantt-row">
        <div class="gantt-label ${t.done?'done':''}">
          <span class="gcheck" onclick="toggleTaskG('${ph.id}','${t.id}')">${t.done?'✓':''}</span>
          <span class="gname" title="${esc(t.name)}">${esc(t.name)}</span>
        </div>
        <div class="gantt-cells">${cells}${bar}</div>
      </div>`;
    });
  });
  return `<div class="gantt-wrap"><div class="gantt-scroll"><div class="gantt">${head}${rows}</div></div>
    <div class="gantt-hint">🎯 ${D.openDate} 開院　／　バーの色は時期フェーズに対応。チェックはリストと連動します。</div></div>`;
}

/* ============ 予算 ============ */
function sumItems(items,field){return items.reduce((s,i)=>s+(Number(i[field])||0),0);}
function budgetTotals(groups,field){let s=0;groups.forEach(g=>g.mids.forEach(m=>s+=sumItems(m.items,field)));return s;}
function renderBudget(){
  const el=document.getElementById('tab-budget');
  const nowTotal=budgetTotals(D.budget,'now'); // 現在の見込み総額（全項目の実額）
  // 計画総額 = 「見積のある大項目」は見積合計、「計画枠のみの大項目」は計画枠、を足し合わせたもの（全部を含む）
  let planTotal=0, estOnlyTotal=0, estOnlyNow=0;
  D.budget.forEach(g=>{
    const hasEst=g.mids.some(m=>m.items.some(i=>Number(i.est)>0));
    const gEst=g.mids.reduce((s,m)=>s+sumItems(m.items,'est'),0);
    const gNow=g.mids.reduce((s,m)=>s+sumItems(m.items,'now'),0);
    if(hasEst){
      planTotal+=gEst;
      estOnlyTotal+=gEst; estOnlyNow+=gNow;
    }else{
      planTotal+=Number(g.plan)||gNow; // 見積のない大項目は計画枠を基準に（枠がなければ現在額をそのまま）
    }
  });
  const diff=nowTotal-planTotal; // 全部込みの本当の差
  const estDiff=estOnlyNow-estOnlyTotal; // 見積のある部分だけの差（参考）
  h=`<div class="panel-head"><h2>予算：計画 vs 現在</h2><button class="btn" onclick="addBGroup('budget')">＋ 大項目</button></div>`;
  h+=`<div class="bsum">
    <div class="bcard"><div class="lbl">計画総額</div><div class="val num">${man(planTotal)}</div></div>
    <div class="bcard"><div class="lbl">現在の見込み</div><div class="val num">${man(nowTotal)}</div></div>
    <div class="bcard ${diff>0?'over':'under'}"><div class="lbl">計画との差</div><div class="val num">${diff===0?'±0':(diff>0?'+':'')+man(diff)}</div></div>
  </div>`;
  h+=`<div style="font-size:11.5px;color:var(--sub);margin:-6px 2px 12px">計画総額＝公式見積のある項目（<span style="color:var(--orange-deep);font-weight:700">オレンジの差額</span>）の見積合計＋什器備品など計画枠のみの項目（<span style="color:var(--blue);font-weight:700">青の差額</span>）の枠を、すべて合算したものです。（参考：見積のある部分だけの差額 ${estDiff===0?'±0':(estDiff>0?'+':'')+man(estDiff)}）<br>金額はすべて税込。各項目をタップすると見積・現在を編集できます。</div>`;
  h+=renderBGroups(D.budget,'budget',true);
  const runNow=budgetTotals(D.running,'now');
  h+=`<div class="run-wrap"><div class="run-title">📅 ランニングコスト（月額）<span class="run-total num">合計 ${yen(runNow)}／月</span></div>
    <div style="font-size:11.5px;color:var(--sub);margin:2px 2px 10px">初期費用とは別に、毎月かかる費用です。</div>`;
  h+=renderBGroups(D.running,'running',true);
  h+=`</div>`;
  el.innerHTML=h;
}
function renderBGroups(groups,scope,cmp){
  let h='';
  groups.forEach(g=>{
    const gEst=g.mids.reduce((s,m)=>s+sumItems(m.items,'est'),0);
    const gNow=g.mids.reduce((s,m)=>s+sumItems(m.items,'now'),0);
    const plan=Number(g.plan)||0;
    const hasEst = g.mids.some(m=>m.items.some(i=>Number(i.est)>0)); // 公式見積のある項目が1つでもあるか
    const anyInput = g.mids.some(m=>m.items.some(i=>Number(i.now)>0||Number(i.est)>0));
    const gd=gNow-gEst;
    let sumHtml;
    if(cmp && hasEst && anyInput){
      // 見積のある大項目：見積→現在の増減を主軸に、計画枠は参考併記
      const planTag = plan?`<span style="font-size:10.5px;color:var(--sub);font-weight:500">計画枠 ${man(plan)}｜</span>`:'';
      sumHtml=`${planTag}<span class="num" style="color:var(--sub)">${man(gEst)}</span> → <span class="num">${man(gNow)}</span>${gd!==0?`<span class="diff ${gd>0?'up':'down'} num" style="margin-left:5px">${gd>0?'+':''}${man(gd)}</span>`:''}`;
    }else if(cmp && plan){
      // 見積のない大項目（什器備品など）：計画枠→現在のみ、未入力なら差額を出さない
      if(!anyInput){
        sumHtml=`<span class="num" style="color:var(--sub)">計画枠 ${man(plan)}</span> <span style="font-size:11px;color:var(--sub)">未入力</span>`;
      }else{
        const pd=gNow-plan;
        sumHtml=`<span class="num" style="color:var(--sub)">計画枠${man(plan)}→</span><span class="num">${man(gNow)}</span>${pd!==0?`<span class="diff ${pd>0?'plan-up':'plan-down'} num" style="margin-left:5px">${pd>0?'+':''}${man(pd)}</span>`:''}`;
      }
    }else{
      sumHtml=`<span class="num">${man(gNow)}</span>`;
    }
    h+=`<div class="grp ${g.open===false?'closed':''}" data-gid="${g.id}">
      <div class="grp-head b" onclick="toggleGrp('${scope}','${g.id}')">
        <span class="caret">▼</span><span ondblclick="event.stopPropagation();renameBGroup('${scope}','${g.id}')">${esc(g.name)}</span>
        <span class="g-sum">${sumHtml}</span></div>
      <div class="grp-body">`;
    g.mids.forEach(m=>{
      const mEst=sumItems(m.items,'est'), mNow=sumItems(m.items,'now');
      const mPlan=Number(m.plan)||0;
      const mHasEst=m.items.some(i=>Number(i.est)>0);
      const mAnyInput=m.items.some(i=>Number(i.now)>0||Number(i.est)>0);
      let midSum;
      if(cmp && mPlan && !mHasEst){
        // 中項目に予定額はあるが公式見積がない：予定→現在のみ
        if(!mAnyInput){
          midSum=`<span class="num" style="color:var(--sub)">予定 ${man(mPlan)}</span> <span style="font-size:10.5px;color:var(--sub)">未入力</span>`;
        }else{
          const pd=mNow-mPlan;
          midSum=`<span class="num" style="color:var(--sub)">予定${man(mPlan)}→</span><span class="num">${man(mNow)}</span>${pd!==0?`<span class="diff ${pd>0?'plan-up':'plan-down'} num" style="margin-left:4px">${pd>0?'+':''}${man(pd)}</span>`:''}`;
        }
      }else if(cmp && mHasEst){
        const md=mNow-mEst;
        midSum = md!==0
          ? `<span class="num" style="color:var(--sub);font-weight:500">${man(mEst)}→</span><span class="num">${man(mNow)}</span><span class="diff ${md>0?'up':'down'} num" style="margin-left:4px">${md>0?'+':''}${man(md)}</span>`
          : `<span class="num">${man(mNow)}</span>`;
      }else{
        midSum=`<span class="num">${man(mNow)}</span>`;
      }
      h+=`<div class="mid"><div class="mid-head"><span ondblclick="renameMid('${scope}','${g.id}','${m.id}')">${esc(m.name)}</span><span class="m-sum">${midSum}</span></div>`;
      m.items.forEach(it=>{
        const est=Number(it.est)||0, now=Number(it.now)||0;
        const d=now-est;
        let priceHtml;
        if(cmp && est>0 && d!==0){
          priceHtml=`<span class="price cmp num">${man(est)}→</span> <span class="num">${man(now)}</span><span class="diff ${d>0?'up':'down'} num">${d>0?'+':''}${man(d)}</span>`;
        }else{
          priceHtml=`<span class="num">${man(now)}</span>`;
        }
        // 手配メタ（発注日・契約日・メモ）
        let meta='';
        if(it.orderDate)meta+=`<span class="ometa">📅 発注 ${esc(it.orderDate)}</span>`;
        if(it.contractDate)meta+=`<span class="ometa">📝 契約 ${esc(it.contractDate)}</span>`;
        const memoBtn=it.memo?`<button class="memo-toggle" onclick="event.stopPropagation();toggleMemo('${it.id}')">📝</button>`:'';
        const docBtn=it.docUrl?`<a class="doc-btn" href="${esc(it.docUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📎 契約書</a>`:'';
        h+=`<div class="row brow ${it.got?'got':''}">
          <span class="tcheck" onclick="event.stopPropagation();toggleBGot('${scope}','${g.id}','${m.id}','${it.id}')">${it.got?'✓':''}</span>
          <span class="r-name ${it.got?'got-text':''}" onclick="editBItem('${scope}','${g.id}','${m.id}','${it.id}')">${esc(it.name)}${it.sub?`<span class="sub">${esc(it.sub)}</span>`:''}${meta||docBtn?`<span class="ometa-wrap">${meta}${docBtn}</span>`:''}</span>
          ${it.status?`<span class="status ${it.status}">${it.status==='fixed'?'確定':'暫定'}</span>`:''}
          <span class="price" onclick="editBItem('${scope}','${g.id}','${m.id}','${it.id}')">${priceHtml}</span>
          ${memoBtn}
        </div>
        ${it.memo?`<div class="memo" id="memo-${it.id}">${linkify(it.memo)}</div>`:''}`;
      });
      h+=`<button class="mid-add" onclick="addBItem('${scope}','${g.id}','${m.id}')">＋ 項目</button></div>`;
    });
    h+=`<button class="mid-add" onclick="addMid('${scope}','${g.id}')">＋ 中項目</button></div></div>`;
  });
  return h;
}
function scopeArr(scope){return scope==='budget'?D.budget:scope==='running'?D.running:D.prep;}
function toggleGrp(scope,gid){const g=scopeArr(scope).find(x=>x.id===gid);g.open=g.open===false?true:false;save();rerender(scope);}
function addBGroup(scope){
  const isBudget=scope==='budget';
  openModal(`<h3>大項目を追加</h3><div class="field"><label>名前（絵文字も使えます）</label><input id="f-n" placeholder="例）🏢 建物・内装"></div>
   ${isBudget?`<div class="field"><label>当初計画の枠（円・任意）</label><input id="f-p" type="number" inputmode="numeric" placeholder="例）30000000"></div>`:''}
   <div class="modal-btns"><button class="mb-cancel" onclick="closeModal()">やめる</button>
   <button class="mb-ok" onclick="scopeArr('${scope}').push({id:uid(),name:val('f-n')||'新項目',open:true,plan:${isBudget}?Number(val('f-p'))||0:0,mids:[]});save();rerender('${scope}');closeModal()">追加</button></div>`);
}
function renameBGroup(scope,gid){const g=scopeArr(scope).find(x=>x.id===gid);
  const isBudget=scope==='budget';
  openModal(`<h3>大項目を編集</h3><div class="field"><label>名前</label><input id="f-n" value="${esc(g.name)}"></div>
   ${isBudget?`<div class="field"><label>当初計画の枠（円）</label><input id="f-p" type="number" inputmode="numeric" value="${g.plan||0}"></div>`:''}
   <div class="modal-btns"><button class="mb-del" onclick="scopeArr('${scope}').splice(scopeArr('${scope}').indexOf(g),1);save();rerender('${scope}');closeModal()">削除</button>
   <button class="mb-cancel" onclick="closeModal()">やめる</button>
   <button class="mb-ok" onclick="g_.name=val('f-n');${isBudget?"g_.plan=Number(val('f-p'))||0;":""}save();rerender('${scope}');closeModal()">保存</button></div>`);
  window.g_=g;
}
function addMid(scope,gid){const g=scopeArr(scope).find(x=>x.id===gid);
  const isBudget=scope==='budget';
  openModal(`<h3>中項目を追加</h3><div class="field"><label>名前</label><input id="f-n" placeholder="例）処置室"></div>
   ${isBudget?`<div class="field"><label>この中項目の予定額（円・任意）</label><input id="f-p" type="number" inputmode="numeric" placeholder="例）3000000"></div>`:''}
   <div class="modal-btns"><button class="mb-cancel" onclick="closeModal()">やめる</button>
   <button class="mb-ok" onclick="g_.mids.push({id:uid(),name:val('f-n')||'新中項目',plan:${isBudget}?Number(val('f-p'))||0:0,items:[]});save();rerender('${scope}');closeModal()">追加</button></div>`);
  window.g_=g;
}
function renameMid(scope,gid,mid){const g=scopeArr(scope).find(x=>x.id===gid);const m=g.mids.find(x=>x.id===mid);
  const isBudget=scope==='budget';
  openModal(`<h3>中項目を編集</h3><div class="field"><label>名前</label><input id="f-n" value="${esc(m.name)}"></div>
   ${isBudget?`<div class="field"><label>この中項目の予定額（円）</label><input id="f-p" type="number" inputmode="numeric" value="${m.plan||0}"></div>`:''}
   <div class="modal-btns"><button class="mb-del" onclick="g_.mids.splice(g_.mids.indexOf(m_),1);save();rerender('${scope}');closeModal()">削除</button>
   <button class="mb-cancel" onclick="closeModal()">やめる</button>
   <button class="mb-ok" onclick="m_.name=val('f-n');${isBudget?"m_.plan=Number(val('f-p'))||0;":""}save();rerender('${scope}');closeModal()">保存</button></div>`);
  window.g_=g;window.m_=m;
}
function toggleBGot(scope,gid,mid,iid){const{it}=findItem(scope,gid,mid,iid);it.got=!it.got;save();rerender(scope);}
function findItem(scope,gid,mid,iid){const m=scopeArr(scope).find(x=>x.id===gid).mids.find(x=>x.id===mid);return{m,it:m.items.find(x=>x.id===iid)};}
function addBItem(scope,gid,mid){bItemModal(scope,gid,mid,null);}
function editBItem(scope,gid,mid,iid){bItemModal(scope,gid,mid,iid);}
function bItemModal(scope,gid,mid,iid){
  const{m,it}=iid?findItem(scope,gid,mid,iid):{m:null,it:{name:"",sub:"",est:"",now:"",status:"tmp",orderDate:"",contractDate:"",memo:"",got:false}};
  const isRun=scope==='running';
  openModal(`<h3>${iid?'項目を編集':'項目を追加'}</h3>
   <div class="field"><label>品名</label><input id="f-n" value="${esc(it.name)}"></div>
   <div class="field"><label>メーカー・補足</label><input id="f-s" value="${esc(it.sub||'')}"></div>
   <div class="field-row">
     <div class="field"><label>${isRun?'月額（当初）':'見積額（当初）'}</label><input id="f-e" type="number" inputmode="numeric" value="${it.est}"></div>
     <div class="field"><label>${isRun?'月額（現在）':'現在額'}</label><input id="f-w" type="number" inputmode="numeric" value="${it.now}"></div>
   </div>
   <div class="field"><label>状態</label><select id="f-st"><option value="tmp" ${it.status==='tmp'?'selected':''}>暫定</option><option value="fixed" ${it.status==='fixed'?'selected':''}>確定</option></select></div>
   ${isRun?'':`<div class="field-row">
     <div class="field"><label>発注日（任意）</label><input id="f-od" type="date" value="${it.orderDate||''}"></div>
     <div class="field"><label>契約日（任意）</label><input id="f-cd" type="date" value="${it.contractDate||''}"></div>
   </div>
   <div class="field"><label>📎 契約書リンク（Google Drive等のURL）</label><input id="f-doc" value="${esc(it.docUrl||'')}" placeholder="https://drive.google.com/..."></div>
   <div class="field"><label>メモ（候補・URL・発注先など）</label><textarea id="f-m" placeholder="候補品やURLを貼れます。URLは自動でリンクになります。">${esc(it.memo||'')}</textarea></div>`}
   <div class="modal-btns">
     ${iid?`<button class="mb-del" onclick="m_.items.splice(m_.items.indexOf(it_),1);save();rerender('${scope}');closeModal()">削除</button>`:''}
     <button class="mb-cancel" onclick="closeModal()">やめる</button>
     <button class="mb-ok" onclick="saveBItem('${scope}','${gid}','${mid}','${iid||''}')">保存</button></div>`);
  window.m_=m;window.it_=it;
}
function saveBItem(scope,gid,mid,iid){
  const name=val('f-n');if(!name){closeModal();return;}
  const isRun=scope==='running';
  const obj={name,sub:val('f-s'),est:Number(val('f-e'))||0,now:Number(val('f-w'))||0,status:document.getElementById('f-st').value};
  if(!isRun){
    obj.orderDate=val('f-od');obj.contractDate=val('f-cd');
    obj.docUrl=val('f-doc');
    obj.memo=document.getElementById('f-m')?document.getElementById('f-m').value:'';
  }
  const m=scopeArr(scope).find(x=>x.id===gid).mids.find(x=>x.id===mid);
  if(iid){const it=m.items.find(x=>x.id===iid);Object.assign(it,obj);}
  else m.items.push({id:uid(),got:false,...obj});
  save();rerender(scope);closeModal();
}

/* ============ 準備品 ============ */
/* ============ 予定 ============ */
function renderCal(){
  const el=document.getElementById('tab-cal');
  let h=`<div class="panel-head"><h2>打ち合わせ・予定</h2><button class="btn" onclick="addCal()">＋ 追加</button></div>`;
  const sorted=[...D.cal].sort((a,b)=>(a.date||'9').localeCompare(b.date||'9'));
  if(!sorted.length)h+=`<div class="empty">予定はまだありません。<br>「＋ 追加」から登録できます。</div>`;
  sorted.forEach(c=>{
    let m='未定',d='—',w='';
    if(c.date){const dt=new Date(c.date+"T00:00:00");m=(dt.getMonth()+1)+'月';d=dt.getDate();w=["日","月","火","水","木","金","土"][dt.getDay()];}
    h+=`<div class="cal-item"><div class="cal-date"><div class="m">${m}</div><div class="d num">${d}</div><div class="w">${w}</div></div>
      <div class="cal-body"><div class="cal-title" onclick="editCal('${c.id}')">${esc(c.title)}</div>
        <div class="cal-meta">${c.place?esc(c.place)+'　':''}${c.note?esc(c.note):''}</div>
        <div class="cal-actions">${c.date?`<a class="cal-gcal" href="${gcalUrl(c)}" target="_blank" rel="noopener">📅 Googleカレンダーに追加</a>`:''}
        <button class="cal-x" onclick="delCal('${c.id}')">✕</button></div>
      </div></div>`;
  });
  el.innerHTML=h;
}
function gcalUrl(c){
  const d=c.date.replace(/-/g,'');
  const text=encodeURIComponent(c.title);
  const details=encodeURIComponent((c.note||''));
  const loc=encodeURIComponent(c.place||'');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${d}/${d}&details=${details}&location=${loc}`;
}
function addCal(){calModal(null);}
function editCal(id){calModal(id);}
function calModal(id){
  const c=id?D.cal.find(x=>x.id===id):{title:"",date:"",place:"",note:""};window.c_=c;
  openModal(`<h3>${id?'予定を編集':'予定を追加'}</h3>
   <div class="field"><label>予定名</label><input id="f-t" value="${esc(c.title)}" placeholder="例）内覧会 打合せ"></div>
   <div class="field"><label>日付</label><input id="f-d" type="date" value="${c.date||''}"></div>
   <div class="field"><label>場所</label><input id="f-p" value="${esc(c.place||'')}"></div>
   <div class="field"><label>メモ</label><input id="f-note" value="${esc(c.note||'')}"></div>
   <div class="modal-btns">
     ${id?`<button class="mb-del" onclick="D.cal.splice(D.cal.indexOf(c_),1);save();renderCal();closeModal()">削除</button>`:''}
     <button class="mb-cancel" onclick="closeModal()">やめる</button>
     <button class="mb-ok" onclick="saveCal('${id||''}')">保存</button></div>`);
}
function saveCal(id){
  const title=val('f-t');if(!title){closeModal();return;}
  const obj={title,date:val('f-d'),place:val('f-p'),note:val('f-note')};
  if(id){Object.assign(D.cal.find(x=>x.id===id),obj);}else D.cal.push({id:uid(),...obj});
  save();renderCal();closeModal();
}
function delCal(id){D.cal=D.cal.filter(x=>x.id!==id);save();renderCal();}

/* ============ 汎用 ============ */
function rerender(scope){renderBudget();}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function linkify(s){return esc(s).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function openModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('modal').classList.add('active');}
function closeModal(){document.getElementById('modal').classList.remove('active');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

/* ============ 初期描画 ============ */
function renderAll(){renderCountdown();renderTodo();renderBudget();renderCal();}
renderAll();          // まず端末内データで即描画
loadCloud();          // その後クラウドと同期
</script>
